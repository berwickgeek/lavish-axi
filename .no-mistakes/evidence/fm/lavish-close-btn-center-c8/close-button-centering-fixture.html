<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Close Button Centering Fixture</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f7f3ea;
        color: #241d13;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(640px, calc(100vw - 48px));
        padding: 36px;
        border: 1px solid #d6c9b8;
        border-radius: 8px;
        background: #fffaf0;
        box-shadow: 0 18px 45px rgb(49 36 16 / 12%);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 30px;
        line-height: 1.1;
      }

      p {
        max-width: 52ch;
        margin: 0 0 24px;
        line-height: 1.55;
      }

      .target {
        display: inline-flex;
        align-items: center;
        min-height: 48px;
        padding: 0 18px;
        border: 1px solid #8a765d;
        border-radius: 6px;
        background: #2d2419;
        color: #fff8ed;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Lavish Close Button Centering Fixture</h1>
      <p>
        This page gives the Lavish annotation chrome a concrete artifact element
        to annotate, so the queued-prompt pill close button can be reviewed in
        the real browser UI.
      </p>
      <div class="target" id="annotation-target">Queue a prompt from this target</div>
    </main>
  </body>
</html>
